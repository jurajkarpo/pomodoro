<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #121212; color: #e6e6e6;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; padding: 20px; user-select: none;
    }
    .modes { display: flex; gap: 8px; margin-bottom: 18px; }
    .mode-btn {
      background: #2a2a2a; border: 1px solid #444; color: #999;
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      font-size: 13px; transition: all 0.2s;
    }
    .mode-btn:hover { background: #333; }
    .mode-btn.active {
      background: #4dabf7; color: #0f0f0f; border-color: #4dabf7; font-weight: 500;
    }
    .timer {
      font-size: 4rem; font-weight: 700; font-variant-numeric: tabular-nums;
      margin: 10px 0 14px; letter-spacing: -1px;
    }
    .controls { display: flex; gap: 10px; }
    .btn {
      padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 500; transition: all 0.2s;
    }
    .start { background: #51cf66; color: #0f0f0f; }
    .start:hover { background: #40c057; }
    .reset { background: #333; color: #e6e6e6; }
    .reset:hover { background: #444; }
    .status { margin-top: 12px; font-size: 12px; color: #666; min-height: 16px; }
  </style>
</head>
<body>
  <div class="modes">
    <button class="mode-btn active" data-mode="work">Work</button>
    <button class="mode-btn" data-mode="short">Short Break</button>
    <button class="mode-btn" data-mode="long">Long Break</button>
  </div>
  <div class="timer" id="timer">25:00</div>
  <div class="controls">
    <button class="btn start" id="startBtn">Start</button>
    <button class="btn reset" id="resetBtn">Reset</button>
  </div>
  <div class="status" id="status">Ready</div>

  <script>
    const MODES = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
    const LABELS = { work: 'Work', short: 'Short Break', long: 'Long Break' };
    let currentMode = 'work', timeLeft = MODES.work, isRunning = false, interval = null;

    const timerEl = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusEl = document.getElementById('status');
    const modeButtons = document.querySelectorAll('.mode-btn');

    const format = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    const update = () => { timerEl.textContent = format(timeLeft); document.title = `${format(timeLeft)} - Pomodoro`; };

    function switchMode(mode) {
      clearInterval(interval); isRunning = false; currentMode = mode; timeLeft = MODES[mode];
      startBtn.textContent = 'Start'; statusEl.textContent = 'Ready';
      modeButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      update();
    }

    function toggle() {
      if (isRunning) {
        clearInterval(interval); isRunning = false;
        startBtn.textContent = 'Resume'; statusEl.textContent = 'Paused';
      } else {
        isRunning = true; startBtn.textContent = 'Pause'; statusEl.textContent = 'Running';
        interval = setInterval(() => {
          if (timeLeft > 0) { timeLeft--; update(); }
          else {
            clearInterval(interval); isRunning = false;
            startBtn.textContent = 'Start'; statusEl.textContent = 'Completed!';
            alert(`${LABELS[currentMode]} finished!`);
          }
        }, 1000);
      }
    }

    function reset() {
      clearInterval(interval); isRunning = false; timeLeft = MODES[currentMode];
      startBtn.textContent = 'Start'; statusEl.textContent = 'Ready'; update();
    }

    modeButtons.forEach(b => b.addEventListener('click', () => switchMode(b.dataset.mode)));
    startBtn.addEventListener('click', toggle);
    resetBtn.addEventListener('click', reset);
    update();
  </script>
</body>
</html>
